apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: airflow
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  # Zwei Quellen: offizielle Chart + unsere values.yaml aus GitHub
  # ArgoCD Multiple Sources (ab ArgoCD 2.6)
  sources:
    # 1. Offizieller Apache Airflow Helm Chart
    - repoURL: https://airflow.apache.org
      chart: airflow
      targetRevision: "1.16.0"
      helm:
        releaseName: airflow
        valueFiles:
          - $values/ops-repository/helm/airflow-values.yaml

    # 2. Unser Repo — nur für die values.yaml Referenz
    - repoURL: https://github.com/thanghoang-pexon/etl-by-claude.git
      targetRevision: main
      ref: values   # ← wird als $values in valueFiles referenziert

  destination:
    server: https://kubernetes.default.svc
    namespace: airflow

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
      prune: false  # Airflow NICHT prunen — Metadaten-DB darf nicht gelöscht werden
