# Postgres-Credentials im airflow-Namespace
# Damit können ETL-Pods (gestartet von Airflow) auf unsere DIH-Datenbank zugreifen.
# Die Datenbank selbst läuft weiterhin im etl-Namespace.
# Verbindung via cross-namespace DNS: postgres.etl.svc.cluster.local
apiVersion: v1
kind: Secret
metadata:
  name: etl-postgres-credentials
  namespace: airflow
type: Opaque
stringData:
  POSTGRES_USER: etl_user
  POSTGRES_PASSWORD: etl_password
  POSTGRES_DB: nba_dih
